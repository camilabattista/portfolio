    <body>
        <!-- NAV BAR -->
        <header class="header" id="header" role="banner">
            <nav class="header__nav" aria-label="Main navigation">
                <ul class="header__menu" role="menubar">
                    <li class="header__menu-logo" role="none">
                        <a class="header__link" href="" role="menuitem" tabindex="0">Camila Battista</a>

            <article id="work-sheet" class="work-sheet">

                <!-- PROJECT VIDEO -->
                <div class="video__container">
                    <iframe 
                        width="560" 
                        height="315" 
                        src="https://www.youtube.com/embed/JjaoOe3e4QE?si=dYBjHGzVJ78QXrp6" 
                        title="Video de La Puerta" 
                        aria-label="Video de La Puerta"
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin" 
                        allowfullscreen>
                    </iframe>
                </div>

                <!-- IMAGE CAROUSEL - Multiple items -->
                <div class="carousel-container">
                    <div id="projectCarousel" class="carousel slide" data-ride="carousel">
                        
                        <!-- Slides with 2 images each -->
                        <div class="carousel-inner">
                            <!-- Slide 1 - Two images -->
                            <div class="carousel-item active">
                                <div class="carousel-item-inner">
                                    <div class="carousel-item-img">
                                        <img src="../../assets/images/works/la-puerta/la-puerta.png" alt="La Puerta - Scene 1">
                                    </div>
                                    <div class="carousel-item-img">
                                        <img src="../../assets/images/works/la-puerta/la-puerta-2.png" alt="La Puerta - Scene 2">
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Slide 2 - Two images -->
                            <div class="carousel-item">
                                <div class="carousel-item-inner">
                                    <div class="carousel-item-img">
                                        <img src="../../assets/images/works/la-puerta/la-puerta-3.png" alt="La Puerta - Scene 3">
                                    </div>
                                    <div class="carousel-item-img">
                                        <img src="../../assets/images/works/la-puerta/la-puerta-4.png" alt="La Puerta - Scene 4">
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Slide 3 - Two images (add more as needed) -->
                            <div class="carousel-item">
                                <div class="carousel-item-inner">
                                    <div class="carousel-item-img">
                                        <img src="../../assets/images/works/la-puerta/la-puerta-5.png" alt="La Puerta - Scene 5">

                                    <div class="carousel-item-img">
                                        <img src="../../assets/images/works/la-puerta/la-puerta-6.png" alt="La Puerta - Scene 6">
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Controls -->
                        <a class="carousel-control-prev" href="#projectCarousel" role="button" data-slide="prev">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            <span class="sr-only">Previous</span>
                        </a>
                        <a class="carousel-control-next" href="#projectCarousel" role="button" data-slide="next">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            <span class="sr-only">Next</span>
                        </a>
